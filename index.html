<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Perfil do Aluno</title>
    <style>
        body {
            font-family: Arial, sans-serif; 
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #89b2c7;
        }

        h1 {
            text-align: center;
        }

        .card {
            border: 1px solid #bdd6ef;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 15px;
            width: 300px;
            background: rgb(205, 231, 245);
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

<h1>Dados do Aluno</h1>

<div class="card" id="perfil"></div>
<div class="card" id="endereco"></div>
<div class="card" id="escolaridade"></div>

<script>

// 🔹 Dados simulando o JSON
const dados = {
  meu_perfil: {
    nome: "Nicolas",
    idade: 16
  },
  meu_endereco: {
    rua: "manoel marques da rocha",
    cidade: "Campo Largo",
    estado: "Paraná",
    CEP: "83648000"
  },
  Escolaridade: {
    curso: "Desenvolvimento de Sistemas",
    instituicao: "CEOPA",
  }
};

// 🔹 Inserindo dados na tela
document.getElementById('perfil').innerHTML =
    '<h2>Perfil</h2>' +
    '<div>Nome: ' + dados.meu_perfil.nome + '</div>' +
    '<div>Idade: ' + dados.meu_perfil.idade + '</div>';

document.getElementById('endereco').innerHTML =
    '<h2>Endereço</h2>' +
    '<div>Rua: ' + dados.meu_endereco.rua + '</div>' +
    '<div>Cidade: ' + dados.meu_endereco.cidade + '</div>' +
    '<div>Estado: ' + dados.meu_endereco.estado + '</div>' +
    '<div>CEP: ' + dados.meu_endereco.CEP + '</div>';

document.getElementById('escolaridade').innerHTML =
    '<h2>Escolaridade</h2>' +
    '<div>Curso: ' + dados.Escolaridade.curso + '</div>' +
    '<div>Escola: ' + dados.Escolaridade.instituicao + '</div>';

</script>

</body>
</html>
